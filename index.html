<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보험계약 정보 추출</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; background: #f5f5f5; min-height: 100vh; padding: 20px; }
  .container { max-width: 480px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 600; color: #111; margin-bottom: 20px; text-align: center; padding-top: 10px; }
  .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .upload-area { border: 2px dashed #ddd; border-radius: 12px; padding: 32px 20px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
  .upload-area:hover { border-color: #4285f4; }
  .upload-icon { font-size: 36px; margin-bottom: 10px; }
  .upload-title { font-size: 15px; font-weight: 500; color: #333; margin-bottom: 4px; }
  .upload-sub { font-size: 13px; color: #888; }
  #file-input { display: none; }
  #preview-area { display: none; margin-top: 14px; text-align: center; }
  #preview-img { max-height: 160px; max-width: 100%; border-radius: 10px; border: 1px solid #eee; }
  .status { display: none; align-items: center; gap: 10px; padding: 12px 14px; background: #e8f0fe; border-radius: 10px; margin-top: 14px; font-size: 13px; color: #1a73e8; }
  .spinner { width: 16px; height: 16px; border: 2px solid #aac4f5; border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { display: none; padding: 12px 14px; background: #fce8e6; color: #c5221f; border-radius: 10px; font-size: 13px; margin-top: 14px; }
  .result-card { display: none; }
  .field-row { display: flex; flex-direction: column; gap: 4px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
  .field-row:last-child { border-bottom: none; }
  .field-label { font-size: 11px; font-weight: 500; color: #888; letter-spacing: 0.5px; }
  .field-value { font-size: 15px; color: #111; }
  .field-value.missing { color: #bbb; font-style: italic; font-size: 13px; }
  .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.15s; margin-bottom: 10px; }
  .btn-copy { background: #4285f4; color: white; }
  .btn-copy:hover { opacity: 0.9; }
  .btn-new { background: #f0f0f0; color: #333; }
  .btn-new:hover { background: #e5e5e5; }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <h1>📋 보험계약 정보 추출</h1>

  <div class="card">
    <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📄</div>
      <p class="upload-title">보험계약내역서 사진 업로드</p>
      <p class="upload-sub">탭하거나 사진을 끌어다 놓으세요</p>
    </div>
    <input type="file" id="file-input" accept="image/*" capture="environment">
    <div id="preview-area"><img id="preview-img"></div>
    <div class="status" id="status"><div class="spinner"></div><span>AI가 문서를 분석하고 있습니다...</span></div>
    <div class="error" id="error"></div>
  </div>

  <div class="card result-card" id="result-card">
    <div class="field-row">
      <span class="field-label">이름</span>
      <span class="field-value" id="f-name"></span>
    </div>
    <div class="field-row">
      <span class="field-label">휴대폰번호</span>
      <span class="field-value" id="f-mobile"></span>
    </div>
    <div class="field-row">
      <span class="field-label">우편번호</span>
      <span class="field-value" id="f-postal"></span>
    </div>
    <div class="field-row">
      <span class="field-label">주소</span>
      <span class="field-value" id="f-address"></span>
    </div>
  </div>

  <div id="action-area" style="display:none;">
    <button class="btn btn-copy" onclick="copyToClipboard()">📋 구글 시트에 붙여넣기용 복사</button>
    <button class="btn btn-new" onclick="resetApp()">새 사진 업로드</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentData = null;

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); fileInput.value = ''; });

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('status').style.display = 'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function processFile(file) {
  if (!file.type.startsWith('image/')) { showError('이미지 파일만 가능합니다.'); return; }
  document.getElementById('error').style.display = 'none';
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('action-area').style.display = 'none';

  const reader = new FileReader();
  reader.onload = async (e) => {
    const img = new Image();
    img.onload = async () => {
      const canvas = document.createElement('canvas');
      const maxSize = 1200;
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.8);
      const base64 = compressed.split(',')[1];
      const mediaType = 'image/jpeg';

      document.getElementById('preview-img').src = compressed;
      document.getElementById('preview-area').style.display = 'block';
      document.getElementById('status').style.display = 'flex';

      try {
        const resp = await fetch('/api/extract', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ base64, mediaType })
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.error || '서버 오류 ' + resp.status);
        }
        const data = await resp.json();
        currentData = data;
        renderResult(data);
      } catch(err) {
        showError('오류가 발생했습니다: ' + err.message);
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderResult(data) {
  document.getElementById('status').style.display = 'none';
  document.getElementById('result-card').style.display = 'block';
  document.getElementById('action-area').style.display = 'block';

  function setField(id, value) {
    const el = document.getElementById(id);
    if (value) { el.textContent = value; el.className = 'field-value'; }
    else { el.textContent = '정보 없음'; el.className = 'field-value missing'; }
  }
  setField('f-name', data.name);
  setField('f-mobile', data.mobile);
  setField('f-postal', data.postal_code);
  setField('f-address', data.address);
}

function copyToClipboard() {
  if (!currentData) return;
  const row = [
    currentData.name || '',
    currentData.mobile || '',
    currentData.postal_code || '',
    currentData.address || ''
  ].join('\t');
  navigator.clipboard.writeText(row).then(() => {
    showToast('복사 완료! 구글 시트에 붙여넣기 하세요 ✓');
  }).catch(() => {
    showToast('복사 실패 — 직접 선택해서 복사해주세요');
  });
}

function resetApp() {
  currentData = null;
  document.getElementById('preview-area').style.display = 'none';
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('action-area').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  document.getElementById('preview-img').src = '';
}
</script>
</body>
</html>
